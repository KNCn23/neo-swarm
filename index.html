<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NEO Swarm — near-Earth asteroids, live · NASA/JPL data</title>
  <meta name="description" content="The near-Earth asteroid swarm in 3D: thousands of real orbits from NASA/JPL's Small-Body Database, upcoming close approaches, and a real star catalog. EN/TR.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='2.4' fill='%23ffd27d'/><ellipse cx='8' cy='8' rx='7' ry='4.4' fill='none' stroke='%23ff7a5c' stroke-width='1' transform='rotate(-25 8 8)'/><circle cx='12.8' cy='5.4' r='1.2' fill='%2358e6d9'/></svg>">
</head>
<body>
  <canvas id="stars-canvas"></canvas>
  <canvas id="trail-canvas"></canvas>
  <canvas id="top-canvas"></canvas>

  <header>
    <div class="brand">
      <div id="eyebrow" class="eyebrow"></div>
      <h1 id="brand-title"></h1>
      <div id="stats" class="stats"></div>
    </div>
    <div class="header-right">
      <div class="chip-row" id="swarm-chips">
        <button data-mode="all" class="chip active"></button>
        <button data-mode="pha" class="chip chip-warn"></button>
        <button data-mode="off" class="chip"></button>
      </div>
      <div class="chip-row" id="star-chips">
        <span class="chip-label" id="star-label"></span>
        <button data-mode="bright" class="chip active"></button>
        <button data-mode="all" class="chip"></button>
        <button data-mode="off" class="chip"></button>
      </div>
      <div class="chip-row">
        <span class="chip-label" id="focus-label"></span>
        <button id="focus-sun" class="chip active">☉</button>
        <button id="focus-earth" class="chip">⊕</button>
        <span class="spacer"></span>
        <nav class="lang-switch" aria-label="Language">
          <button id="lang-en" type="button">EN</button>
          <button id="lang-tr" type="button">TR</button>
        </nav>
        <a class="gh-link" href="https://github.com/KNCn23/neo-swarm" aria-label="GitHub" target="_blank" rel="noopener">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
        </a>
      </div>
    </div>
  </header>

  <aside id="ca-panel">
    <button id="ca-toggle" type="button"></button>
    <div id="ca-body">
      <div id="ca-title"></div>
      <div id="ca-list"></div>
      <p id="ca-note"></p>
    </div>
  </aside>

  <aside id="card">
    <div id="card-head">
      <span id="card-title"></span>
      <button id="card-close" type="button" aria-label="Close">×</button>
    </div>
    <div id="card-badges"></div>
    <div id="card-body"></div>
    <button id="card-watch" type="button"></button>
  </aside>

  <div id="hint"></div>
  <div id="sources"></div>
  <div id="loading"><span></span></div>

  <div id="controls">
    <button id="btn-play" type="button">⏸</button>
    <button id="btn-dir" type="button">⏩</button>
    <input id="speed" type="range" min="0" max="5" step="1" value="3" aria-label="speed">
    <span id="speed-label"></span>
    <span id="date-label"></span>
    <input id="date-input" type="date" aria-label="date">
    <button id="btn-today" type="button"></button>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
