<svg viewBox="0 0 1200 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="neo-swarm — 6,800 real asteroid orbits from NASA/JPL + 41,000 real stars — the near-Earth swarm, live">
  <style>
    .mono { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .cursor { animation: blink 1.2s step-end infinite; }
  </style>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58e6d9"/>
      <stop offset="1" stop-color="#7c8cff"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#1f2a3c"/>
    </pattern>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <clipPath id="frame">
      <rect x="1" y="1" width="1198" height="238" rx="16"/>
    </clipPath>
  </defs>
  <rect x="1" y="1" width="1198" height="238" rx="16" fill="#0a0e14"/>
  <g clip-path="url(#frame)">
    <rect x="1" y="1" width="1198" height="238" fill="url(#dots)" opacity="0.55"/>
    <circle cx="1090" cy="10" r="190" fill="#58e6d9" opacity="0.08" filter="url(#soft)"/>
    <circle cx="120" cy="250" r="200" fill="#7c8cff" opacity="0.09" filter="url(#soft)"/>
    <rect x="1" y="1" width="1198" height="5" fill="url(#accent)"/>
  </g>
  <rect x="1" y="1" width="1198" height="238" rx="16" fill="none" stroke="#1f2a3c" stroke-width="2"/>
  <text x="70" y="72" class="mono" font-size="15" textLength="306" lengthAdjust="spacingAndGlyphs" fill="#8b9bb4">~ $ git clone KNCn23/neo-swarm.git</text>
  <rect x="384" y="59" width="8" height="15" fill="#58e6d9" class="cursor"/>
  <text x="1130" y="72" class="mono" font-size="13" fill="#8b9bb4" text-anchor="end">github.com/KNCn23</text>
  <text x="68" y="128" class="mono" font-size="46" font-weight="700" fill="url(#accent)">neo-swarm</text>
  <text x="70" y="166" class="mono" font-size="16" fill="#d6e2f0">6,800 real asteroid orbits from NASA/JPL + 41,000 real stars — the near-Earth swarm, live</text>
  <g class="mono" font-size="13">
    <rect x="70" y="190" width="96" height="30" rx="15" fill="rgba(88,230,217,0.08)" stroke="rgba(88,230,217,0.35)"/>
    <text x="118.0" y="210" fill="#58e6d9" text-anchor="middle">Canvas 2D</text>
    <rect x="178" y="190" width="88" height="30" rx="15" fill="rgba(124,140,255,0.08)" stroke="rgba(124,140,255,0.4)"/>
    <text x="222.0" y="210" fill="#7c8cff" text-anchor="middle">JPL SBDB</text>
    <rect x="278" y="190" width="65" height="30" rx="15" fill="rgba(88,230,217,0.08)" stroke="rgba(88,230,217,0.35)"/>
    <text x="310.5" y="210" fill="#58e6d9" text-anchor="middle">CNEOS</text>
    <rect x="355" y="190" width="96" height="30" rx="15" fill="rgba(124,140,255,0.08)" stroke="rgba(124,140,255,0.4)"/>
    <text x="403.0" y="210" fill="#7c8cff" text-anchor="middle">41k stars</text>
    <rect x="463" y="190" width="81" height="30" rx="15" fill="rgba(88,230,217,0.08)" stroke="rgba(88,230,217,0.35)"/>
    <text x="503.5" y="210" fill="#58e6d9" text-anchor="middle">EN · TR</text>
  </g>
</svg>
